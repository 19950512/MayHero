services:
  postgres:
    image: postgres:16-alpine
    container_name: mayhero-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mayhero}
      POSTGRES_USER: ${POSTGRES_USER:-mayhero}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    expose:
      - "5432"
    ports:
      - "5432:5432"
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    networks:
      - mayhero_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mayhero}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: mayhero-redis-prod
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    expose:
      - "6379"
    volumes:
      - redis_prod_data:/data
    networks:
      - mayhero_internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.prod
    container_name: mayhero-api
    restart: unless-stopped
    expose:
      - "3070"
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3070
      DATABASE_URL: postgresql://${POSTGRES_USER:-mayhero}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-mayhero}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET with at least 32 chars in .env}
      WEB_URL: ${WEB_URL:-https://mayhero.com.br}
      AUTH_COOKIE_NAME: ${AUTH_COOKIE_NAME:-mayhero_token}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mayhero_internal
      - nginx_web
    command: >
      sh -c "
        npx prisma db push &&
        node /app/node_modules/.bin/tsx src/server.ts
      "

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://mayhero.com.br/api}
    container_name: mayhero
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      NODE_ENV: production
    depends_on:
      - api
    networks:
      - nginx_web

volumes:
  postgres_prod_data:
  redis_prod_data:

networks:
  mayhero_internal:
    driver: bridge
  nginx_web:
    external: true
    name: nginx_web
