services:
  postgres:
    image: postgres:16-alpine
    container_name: mayhero-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mayhero}
      POSTGRES_USER: ${POSTGRES_USER:-mayhero}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    expose:
      - "5432"
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mayhero}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: mayhero-redis-prod
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    expose:
      - "6379"
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.dev
    container_name: mayhero-api-prod
    restart: unless-stopped
    ports:
      - "${API_PORT:-3070}:3070"
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3070
      DATABASE_URL: postgresql://${POSTGRES_USER:-mayhero}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-mayhero}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET with at least 32 chars in .env}
      WEB_URL: ${WEB_URL:-http://localhost:3069}
      AUTH_COOKIE_NAME: ${AUTH_COOKIE_NAME:-mayhero_token}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "
        npm install &&
        npx prisma generate &&
        npm run build &&
        npx prisma db push &&
        npm run start
      "

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.dev
    container_name: mayhero-web-prod
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3069}:3069"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3070}
    depends_on:
      - api
    command: >
      sh -c "
        npm install &&
        npm run build &&
        npm run start
      "

volumes:
  postgres_prod_data:
  redis_prod_data:
